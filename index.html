};

/* ---- OpenAI API (direct browser, user's own key) ---- */
async function askOpenAI(apiKey, model, messages){
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: { "content-type": "application/json", "authorization": "Bearer " + apiKey },
    body: JSON.stringify({ model: model || "gpt-4o", messages }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "APIエラー");
  return data.choices?.[0]?.message?.content || "";
}
function parseJSON(t){ const c=t.replace(/```json|```/g,"").trim(); const s=c.indexOf("{"),e=c.lastIndexOf("}"); return JSON.parse(s>=0?c.slice(s,e+1):c); }

/* ---- ring ---- */
function Ring({value, goal}){
  const r=78, circ=2*Math.PI*r, pct=Math.min(1, goal? value/goal:0);
  return (
    <svg width="190" height="190" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r={r} fill="none" stroke={C.line} strokeWidth="14"/>
      <circle cx="100" cy="100" r={r} fill="none" stroke={C.kcal} strokeWidth="14" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} transform="rotate(-90 100 100)" style={{transition:"stroke-dashoffset .5s"}}/>
      <text x="100" y="94" textAnchor="middle" fontSize="34" fontWeight="700" fill={C.ink}>{Math.round(value)}</text>
      <text x="100" y="120" textAnchor="middle" fontSize="16" fill={C.sub}>kcal</text>
    </svg>
  );
}

/* ---- line chart with dashed baselines ---- */
function Chart({data, series, baselines=[], height=200}){
  const W=320, H=height, padX=36, padT=14, padB=24;
  const xs=data.map((_,i)=> padX + (data.length<=1?(W-padX*2)/2 : i*(W-padX*2)/(data.length-1)));
  const vals=[...series.flatMap(s=>data.map(d=>d[s.key]).filter(v=>v!=null&&!isNaN(v))), ...baselines.map(b=>b.value)];
  let max=vals.length?Math.max(...vals):1, min=vals.length?Math.min(...vals):0;
  if(min===max){max+=1;min-=1;}
  const r=max-min; max+=r*0.14; min-=r*0.14;
  const y=v=> (H-padB) - (v-min)/(max-min)*(H-padT-padB);
  const every=Math.ceil(data.length/7)||1;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {baselines.map((b,i)=>(
        <g key={"b"+i}>
          <line x1={padX} y1={y(b.value)} x2={W-padX} y2={y(b.value)} stroke={b.color} strokeWidth="1.5" strokeDasharray="2 3" opacity="0.8"/>
          {b.label && <text x={W-padX} y={y(b.value)-4} textAnchor="end" fontSize="9" fill={b.color}>{b.label}</text>}
        </g>
      ))}
      {series.map(s=>{
        const pts=data.map((d,i)=> d[s.key]==null||isNaN(d[s.key])?null:`${xs[i]},${y(d[s.key])}`).filter(Boolean).join(" ");
        return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>;
      })}
      {series.map(s=>data.map((d,i)=> d[s.key]==null||isNaN(d[s.key])?null:<circle key={s.key+i} cx={xs[i]} cy={y(d[s.key])} r="3" fill={s.color}/>))}
      {data.map((d,i)=> i%every===0?<text key={"x"+i} x={xs[i]} y={H-8} textAnchor="middle" fontSize="9" fill={C.sub}>{d.date}</text>:null)}
    </svg>
  );
}

const Bar = ({label,color,value,goal}) => {
  const pct=Math.min(100, goal?(value/goal)*100:0);
  return <div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:5}}>
      <span style={{color:C.ink}}><span style={{color,marginRight:6}}>●</span>{label}</span>
      <span style={{color:C.sub}}>{Math.round(value)}g / {goal}g</span>
    </div>
    <div style={{height:8,background:C.line,borderRadius:99}}><div style={{height:8,width:pct+"%",background:color,borderRadius:99,transition:"width .4s"}}/></div>
  </div>;
};

/* ---- 日付ナビゲーション ---- */
function DateBar({date,setDate}){
  const ref=useRef();
  const isToday=date===todayKey();
  const open=()=>{ const el=ref.current; if(!el) return; try{ el.showPicker ? el.showPicker() : el.click(); }catch{ el.click(); } };
  const arrow={width:30,height:30,border:"none",borderRadius:9,background:"#fff",color:C.blue,fontSize:20,lineHeight:1,cursor:"pointer",boxShadow:"0 1px 2px rgba(0,0,0,.08)",display:"grid",placeItems:"center"};
  return (
    <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
      {!isToday && <button onClick={()=>setDate(todayKey())} style={{border:"none",borderRadius:8,background:C.blue,color:"#fff",fontSize:11,fontWeight:700,padding:"5px 8px",cursor:"pointer"}}>今日</button>}
      <button onClick={()=>setDate(shiftDate(date,-1))} style={arrow}>‹</button>
      <button onClick={open} style={{position:"relative",border:"none",borderRadius:9,background:"#fff",color:C.ink,fontSize:13,fontWeight:700,padding:"6px 10px",cursor:"pointer",boxShadow:"0 1px 2px rgba(0,0,0,.08)",whiteSpace:"nowrap"}}>
        {fmtDateW(date)}
        <input ref={ref} type="date" value={date} max={todayKey()} onChange={e=>e.target.value&&setDate(e.target.value)}
          style={{position:"absolute",inset:0,opacity:0,pointerEvents:"none",width:"100%",height:"100%"}}/>
      </button>
      <button onClick={()=>{ if(!isToday) setDate(shiftDate(date,1)); }} disabled={isToday} style={{...arrow,opacity:isToday?0.35:1,cursor:isToday?"default":"pointer"}}>›</button>
    </div>
  );
}

/* ================= APP ================= */
/* 画面内エラーを握りつぶさず表示する（欄が黙って消えるのを防ぐ） */
class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ console.error(err,info); }
  render(){
    if(this.state.err) return (
      <div className="card" style={{margin:0,border:"1px solid #fecaca",background:"#fef2f2"}}>
        <div style={{fontWeight:700,color:"#b91c1c",marginBottom:6}}>表示中にエラーが発生しました</div>
        <div style={{fontSize:12,color:"#7f1d1d",whiteSpace:"pre-wrap",wordBreak:"break-word",marginBottom:10}}>{String((this.state.err&&this.state.err.message)||this.state.err)}</div>
        <button className="pri" onClick={()=>this.setState({err:null})}>再表示</button>
      </div>
    );
    return this.props.children;
  }
}

function App(){
  const [tab,setTab]=useState("home");
  const [date,setDate]=useState(todayKey());
  const [allMeals,setAllMeals]=useState(()=>LS.get("allMeals",{}));
  const [favorites,setFavorites]=useState(()=>{ const s=LS.get("favorites",null); if(s) return s; LS.set("favorites",DEFAULT_FAVORITES); return DEFAULT_FAVORITES; });
  const [goals,setGoals]=useState(()=>LS.get("goals",{kcal:1250,p:78,f:34,c:156}));
  const [weights,setWeights]=useState(()=>LS.get("weights",{}));
  const [apiKey,setApiKey]=useState(()=>LS.get("apiKey",""));
  const [model,setModel]=useState(()=>LS.get("model","gpt-4o"));

  const meals = allMeals[date] || [];
  const persistMeals=(next)=>{ const a={...allMeals,[date]:next}; setAllMeals(a); LS.set("allMeals",a); };
  const addMeal=(m)=>persistMeals([...meals,{id:uid(),...m}]);
  const addMealsToDate=(dk,items)=>{ const a={...allMeals}; const cur=a[dk]?[...a[dk]]:[]; items.forEach(m=>cur.push({id:uid(),...m})); a[dk]=cur; setAllMeals(a); LS.set("allMeals",a); };
  const delMeal=(id)=>persistMeals(meals.filter(x=>x.id!==id));
  const updateMealAt=(dk,id,patch)=>{ const a={...allMeals}; a[dk]=(a[dk]||[]).map(m=>m.id===id?{...m,...patch}:m); setAllMeals(a); LS.set("allMeals",a); };
  const delMealAt=(dk,id)=>{ const a={...allMeals}; a[dk]=(a[dk]||[]).filter(m=>m.id!==id); if(!a[dk].length) delete a[dk]; setAllMeals(a); LS.set("allMeals",a); };
  const delDay=(dk)=>{ const a={...allMeals}; delete a[dk]; setAllMeals(a); LS.set("allMeals",a); };
  const addFav=(f)=>{const n=[...favorites,{id:uid(),...f}];setFavorites(n);LS.set("favorites",n);};
  const delFav=(id)=>{const n=favorites.filter(x=>x.id!==id);setFavorites(n);LS.set("favorites",n);};
  const saveGoals=(g)=>{setGoals(g);LS.set("goals",g);};
  const saveWeight=(k,v)=>{const n={...weights,[k]:v};setWeights(n);LS.set("weights",n);};
  const saveKey=(k)=>{setApiKey(k);LS.set("apiKey",k);};
  const saveModel=(m)=>{setModel(m);LS.set("model",m);};

  const todayRef=useRef(todayKey());
  useEffect(()=>{
    const sync=()=>{ const t=todayKey(); const prev=todayRef.current; if(t!==prev){ todayRef.current=t; setDate(d=> d===prev ? t : d); } };
    const onVis=()=>{ if(document.visibilityState==="visible") sync(); };
    document.addEventListener("visibilitychange",onVis);
    window.addEventListener("focus",sync);
    const iv=setInterval(sync,60000);
    return ()=>{ document.removeEventListener("visibilitychange",onVis); window.removeEventListener("focus",sync); clearInterval(iv); };
  },[]);

  const tabs=[["home","ホーム","home"],["graph","グラフ","graph"],["record","記録","add"],["register","登録","star"],["history","履歴","hist"]];

  return (
    <div style={{maxWidth:440,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px",background:"linear-gradient(90deg,#eff6ff,#dbeafe)",borderBottom:`1px solid ${C.line}`,position:"sticky",top:0,zIndex:5}}>
        <span style={{fontSize:18}}>🔥</span><span style={{fontWeight:700,fontSize:17,color:C.ink}}>{APP_NAME}</span>
        <DateBar date={date} setDate={setDate}/>
      </div>

      <div className="scroll" style={{flex:1,overflowY:"auto",padding:16,paddingBottom:90}}>
        <ErrorBoundary key={tab}>
        {tab==="home" && <HomeTab meals={meals} goals={goals} allMeals={allMeals} date={date} weights={weights} onDelete={delMeal}/>}
        {tab==="graph" && <GraphTab allMeals={allMeals} weights={weights} goals={goals}/>}
        {tab==="record" && <RecordTab favorites={favorites} onAdd={addMeal} onRegisterDay={addMealsToDate} date={date} apiKey={apiKey} model={model} goto={()=>setTab("register")}/>}
        {tab==="register" && <RegisterTab favorites={favorites} goals={goals} weights={weights} date={date} apiKey={apiKey} model={model}
            onAddFav={addFav} onDelFav={delFav} onSaveGoals={saveGoals} onSaveWeight={saveWeight} onSaveKey={saveKey} onSaveModel={saveModel}/>}
        {tab==="history" && <HistoryTab allMeals={allMeals} onEdit={updateMealAt} onDelete={delMealAt} onDelDay={delDay}/>}
        </ErrorBoundary>
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:440,margin:"0 auto",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 0 16px",background:"#fff",borderTop:`1px solid ${C.line}`}}>
        {tabs.map(([id,label,icon])=>{
          const active=tab===id;
          if(id==="record") return (
            <button key={id} onClick={()=>setTab(id)} style={{border:"none",background:"none",display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"}}>
              <div style={{width:52,height:52,borderRadius:99,background:C.blue,display:"grid",placeItems:"center",marginTop:-22,boxShadow:"0 4px 12px rgba(37,99,235,.4)"}}>
                <svg width="26" height="26" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              </div>
              <span style={{fontSize:11,color:C.sub,marginTop:2}}>{label}</span>
            </button>
          );
          return (
            <button key={id} onClick={()=>setTab(id)} style={{border:"none",background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}}>
              <Icon n={icon} c={active?C.blue:C.sub}/><span style={{fontSize:11,color:active?C.blue:C.sub}}>{label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ドット絵マスコット本体（特典の王冠/オーラ、体重トレンドのツノ/羽を重ねる） */
function Mascot({form, streakTier=-1, aura=false, mood=null, s=170}){
  const src=SPRITES[form]||SPRITES.egg;
  const filt = mood==="dark" ? "saturate(1.35) brightness(.78) hue-rotate(250deg)" : (mood==="angel" ? "brightness(1.07) saturate(1.05)" : "none");
  const col = streakTier===0 ? "#ec4899" : (streakTier===1 ? "#cbd5e1" : "#fbbf24");
  return (
    <div style={{position:"relative",width:s,height:s,margin:"0 auto",animation:"bob 2.8s ease-in-out infinite"}}>
      <svg viewBox="0 0 100 100" style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible",zIndex:0,pointerEvents:"none"}}>
        {mood==="angel" && <g>
          <path d="M33 52 q-26 -10 -28 14 q16 -3 28 2 z" fill="#f4f7fc" stroke="#cdd9e6" strokeWidth="1"/>
          <path d="M67 52 q26 -10 28 14 q-16 -3 -28 2 z" fill="#f4f7fc" stroke="#cdd9e6" strokeWidth="1"/>
        </g>}
        {aura && [[12,16],[88,18],[16,78],[84,74],[50,5],[30,8]].map(([x,y],i)=>(<g key={i}><circle cx={x} cy={y} r="2.2" fill="#fbbf24"/><circle cx={x} cy={y} r="0.9" fill="#fff7d6"/></g>))}
        {mood==="dark" && [[12,18],[88,20],[18,76],[82,72],[50,6]].map(([x,y],i)=>(<circle key={i} cx={x} cy={y} r="2" fill="#7c3aed"/>))}
      </svg>
      <img src={src} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"contain",imageRendering:"pixelated",filter:filt,zIndex:1}}/>
      <svg viewBox="0 0 100 100" style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible",zIndex:2,pointerEvents:"none"}}>
        {mood==="angel" && <ellipse cx="50" cy="7" rx="13" ry="3.4" fill="none" stroke="#facc15" strokeWidth="2.4"/>}
        {mood==="dark" && <g fill="#3b2a52"><polygon points="40,15 36,5 44,12"/><polygon points="60,15 64,5 56,12"/></g>}
        {streakTier>=0 && (streakTier===0
          ? <g fill={col}><path d="M44 13 l6 4 -6 4 z"/><path d="M56 13 l-6 4 6 4 z"/><circle cx="50" cy="17" r="2.4" fill="#be185d"/></g>
          : <g><polygon points="37,17 41,9 45,14 50,6 55,14 59,9 63,17" fill={col} stroke="#0003" strokeWidth="0.6"/><rect x="37" y="15" width="26" height="4" fill={col}/>{streakTier>=2 && <circle cx="50" cy="7" r="1.4" fill="#fff7d6"/>}</g>)}
      </svg>
    </div>
  );
}

/* 選択中の日の食事から、姿（フォーム）とカロリー状態を決める */
function dayState(meals, goals){
  const t=meals.reduce((a,m)=>({p:a.p+(m.p||0),f:a.f+(m.f||0),c:a.c+(m.c||0),kcal:a.kcal+(m.kcal||0)}),{p:0,f:0,c:0,kcal:0});
  const total=t.p+t.f+t.c;
  let form="empty";
  if(total>0){
    const gtot=(goals.p||0)+(goals.f||0)+(goals.c||0)||1;
    const gs={p:(goals.p||0)/gtot, f:(goals.f||0)/gtot, c:(goals.c||0)/gtot};
    const sh={p:t.p/total, f:t.f/total, c:t.c/total};
    const over=[["p",sh.p-gs.p],["f",sh.f-gs.f],["c",sh.c-gs.c]].sort((a,b)=>b[1]-a[1]);
    form = over[0][1] < 0.08 ? "balance" : over[0][0];  // 構成比が目標どおりならバランス、偏れば該当フォーム
  }
  const kr = goals.kcal ? t.kcal/goals.kcal : 0;
  const cond = total===0 ? "none" : (kr>1.3 ? "over" : (kr<0.55 ? "under" : "good"));
  return {t, total, form, cond};
}

function Character({allMeals, goals, date, weights}){
  const meals = allMeals[date] || [];
  const loggedSet = new Set(Object.keys(allMeals).filter(k=>(allMeals[k]||[]).length>0));
  const loggedDays = loggedSet.size;
  const tk=todayKey();
  let streak=0;
  { let start = loggedSet.has(tk) ? 0 : (loggedSet.has(shiftDate(tk,-1)) ? 1 : -1);
    if(start>=0){ let i=start; while(loggedSet.has(shiftDate(tk,-i))){ streak++; i++; } } }
  const MILE=[{d:3,n:"リボン"},{d:7,n:"シルバー王冠"},{d:14,n:"ゴールド王冠"},{d:30,n:"きらめきオーラ"}];
  let tier=-1; MILE.forEach((mm,i)=>{ if(streak>=mm.d) tier=i; });
  const aura = streak>=30;
  const nextMile = MILE.find(mm=>streak<mm.d);
  const wkeys=Object.keys(weights||{}).filter(k=>typeof weights[k]==="number").sort();
  let mood=null, wDelta=null;
  if(wkeys.length>=2){ const last=weights[wkeys[wkeys.length-1]], prev=weights[wkeys[wkeys.length-2]]; wDelta=Math.round((last-prev)*10)/10; if(wDelta>0.2) mood="dark"; else if(wDelta<-0.2) mood="angel"; }
  const exp=loggedDays, level=Math.floor((1+Math.sqrt(1+8*exp))/2);
  const curBase=(level-1)*level/2, nextBase=level*(level+1)/2;
  const expInto=exp-curBase, expSpan=nextBase-curBase;
  const pct=expSpan>0 ? Math.round(expInto/expSpan*100) : 0;

  const d = dayState(meals, goals);
  const isEgg = d.total===0;
  const fm = isEgg ? FORMS.egg : FORMS[d.form];
  const visual = isEgg ? "egg" : d.form;

  let title, name, msg;
  if(isEgg){
    if(loggedDays===0){ title="たまご期"; name="たまご"; msg="ごはんを記録すると、たまごからペコまるが生まれて育っていくよ。"; }
    else { title="おなかぺこぺこ"; name="ねむりペコまる"; msg=`${fmtDate(date)} はまだ記録がないよ。ごはんを記録すると、その日の栄養でペコまるが姿を変えるよ！`; }
  } else { title=fm.title; name=fm.name; msg=fm.msg; }

  const COND={ over:{txt:"食べすぎ気味",emoji:"🍴",col:C.fat}, good:{txt:"いい感じ",emoji:"👍",col:"#16a34a"}, under:{txt:"ひかえめ",emoji:"🍽",col:C.blue} };
  const cond = d.cond!=="none" ? COND[d.cond] : null;
  const gp=(v,g)=> g? Math.round(v/g*100):0;

function GraphTab({allMeals,weights,goals}){
  const [range,setRange]=useState(7);

  const days=[...Array(range)].map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(range-1-i));return d.toISOString().slice(0,10);});
  const data=days.map(k=>{const ms=allMeals[k]||[];const s=ms.reduce((a,m)=>({kcal:a.kcal+m.kcal,p:a.p+m.p,f:a.f+m.f,c:a.c+m.c}),{kcal:0,p:0,f:0,c:0});return {date:fmtDate(k),logged:ms.length>0,kcal:s.kcal,p:s.p,f:s.f,c:s.c,weight:weights[k]??null};});
  const logged=data.filter(d=>d.logged);
  const avg=k=>logged.length?Math.round(logged.reduce((a,d)=>a+d[k],0)/logged.length):0;
  const Stat=({v,l,color})=><div style={{background:C.bg,borderRadius:12,padding:"14px 0",textAlign:"center"}}><div style={{fontSize:24,fontWeight:700,color}}>{v}</div><div style={{fontSize:12,color:C.sub}}>{l}</div></div>;

  const MI={kcal:{label:"カロリー",color:C.kcal,goal:goals.kcal,unit:"kcal"},p:{label:"タンパク質",color:C.prot,goal:goals.p,unit:"g"},f:{label:"脂質",color:C.fat,goal:goals.f,unit:"g"},c:{label:"炭水化物",color:C.carb,goal:goals.c,unit:"g"}};
  const mi=MI[dev];

  const devLogged=devData.filter(x=>x.dev!=null);

  return <>
    <div className="card" style={{display:"flex",gap:8,marginBottom:16,padding:6}}>

    </div>

    <div className="card" style={{marginBottom:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Stat v={avg("kcal")} l="平均kcal" color={C.kcal}/><Stat v={avg("p")+"g"} l="平均P" color={C.prot}/>
      <Stat v={avg("f")+"g"} l="平均F" color={C.fat}/><Stat v={avg("c")+"g"} l="平均C" color={C.carb}/>
    </div>

    <div className="card" style={{marginBottom:16}}>
      <div style={{fontWeight:700,color:C.ink,marginBottom:8}}>カロリー推移（点線＝目安）</div>

    </div>

    <div className="card" style={{marginBottom:16}}>
      <div style={{fontWeight:700,color:C.ink,marginBottom:8}}>PFC推移（点線＝目安）</div>
      <Chart data={data} series={[{key:"p",color:C.prot},{key:"f",color:C.fat},{key:"c",color:C.carb}]}
        baselines={[{value:goals.p,color:C.prot},{value:goals.f,color:C.fat},{value:goals.c,color:C.carb}]}/>
      <div style={{fontSize:12,color:C.sub,display:"flex",gap:14,marginTop:4}}><span style={{color:C.prot}}>● P</span><span style={{color:C.fat}}>● F</span><span style={{color:C.carb}}>● C</span></div>
    </div>

    <div className="card" style={{marginBottom:16}}>
      <div style={{fontWeight:700,color:C.ink,marginBottom:10}}>目標との差（波線＝基準値0）</div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {Object.keys(MI).map(k=><button key={k} onClick={()=>setDev(k)} style={{flex:1,padding:8,border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,background:dev===k?MI[k].color:C.bg,color:dev===k?"#fff":C.sub}}>{k==="kcal"?"kcal":k.toUpperCase()}</button>)}
      </div>
      <Chart data={devData} series={[{key:"dev",color:mi.color}]} baselines={[{value:0,color:C.sub,label:"基準値"}]}/>
      <div style={{fontSize:13,color:C.sub,marginTop:6}}>平均の差: <b style={{color:avgDev>=0?C.fat:C.blue}}>{avgDev>=0?"+":""}{avgDev}{mi.unit}</b>（プラス＝目標オーバー / マイナス＝不足）</div>
    </div>

    <div className="card">
      <div style={{fontWeight:700,color:C.ink,marginBottom:8}}>体重推移</div>

    </div>
  </>;
}

function LabelScan({onAdd,apiKey,model,goto}){
  const [img,setImg]=useState(null);const [b64,setB64]=useState(null);const [mime,setMime]=useState("image/jpeg");
  const [loading,setLoading]=useState(false);const [result,setResult]=useState(null);const [err,setErr]=useState(null);
  const ref=useRef();
  if(!apiKey) return <NoKey goto={goto}/>;
  const pick=e=>{const file=e.target.files?.[0];if(!file)return;setMime(file.type);setImg(URL.createObjectURL(file));setResult(null);setErr(null);const r=new FileReader();r.onload=()=>setB64(r.result.split(",")[1]);r.readAsDataURL(file);};
  const scan=async()=>{ if(!b64)return; setLoading(true);setErr(null);
    try{
      const text=await askOpenAI(apiKey,model,[
        {role:"system",content:"栄養成分表示を読み取るアシスタント。JSONオブジェクトのみ返す。"},
        {role:"user",content:[
          {type:"text",text:'この栄養成分表示の写真から1単位あたりの栄養を読み取り、JSONのみ返す: {"name":string,"kcal":number,"p":number,"f":number,"c":number}。pたんぱく質g/f脂質g/c炭水化物g、読めない値は0。'},
          {type:"image_url",image_url:{url:`data:${mime};base64,${b64}`}}
        ]}
      ]);
      setResult(parseJSON(text));
    }catch(e){ setErr(e.message||"読み取れませんでした"); }
    setLoading(false);
  };
  return <div className="card">
    <div style={{fontWeight:700,color:C.ink,marginBottom:12}}>ラベルスキャン</div>
    <input ref={ref} type="file" accept="image/*" onChange={pick} style={{display:"none"}}/>
    {!img
      ? <button onClick={()=>ref.current.click()} style={{width:"100%",padding:32,border:`2px dashed ${C.line}`,borderRadius:12,background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:C.sub}}><Icon n="img" s={28}/><span>写真を選択</span></button>
      : <><img src={img} style={{width:"100%",borderRadius:12,marginBottom:12}}/>{!result && <button className="pri" onClick={scan} disabled={loading}>{loading?<span className="spin"/>:"AIで読み取る"}</button>}</>}
    {err && <div style={{color:C.fat,fontSize:13,marginTop:10}}>{err}</div>}
    {result && <Confirm result={result} onAdd={onAdd} onReset={()=>{setImg(null);setB64(null);setResult(null);}}/>}
  </div>;
}

function AIChat({onAdd,apiKey,model,goto}){
  const [msgs,setMsgs]=useState([{role:"bot",text:"食べたものを文章で教えてください。例:「鶏むね肉200gと白米一膳」。栄養を推定して記録できます。"}]);

    try{

      ]);

  return <div className="card" style={{display:"flex",flexDirection:"column",height:460,padding:12}}>

        <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%"}}>
          <div style={{padding:"10px 14px",borderRadius:14,fontSize:14,background:m.role==="user"?C.blue:C.bg,color:m.role==="user"?"#fff":C.ink}}>{m.text}</div>
          {m.card && <div style={{marginTop:8,background:"#fff",border:`1px solid ${C.line}`,borderRadius:12,padding:12}}>
            <div style={{fontWeight:600,color:C.ink}}>{m.card.name}</div>
            <div style={{fontSize:12,color:C.sub,margin:"4px 0 10px"}}>{m.card.kcal}kcal · P{m.card.p} F{m.card.f} C{m.card.c}</div>
            <Confirm result={m.card} onAdd={onAdd} compact/>
          </div>}
        </div>
      ))}
      {loading && <div style={{alignSelf:"flex-start"}}><span className="spin" style={{borderColor:C.blue,borderTopColor:"transparent"}}/></div>}
    </div>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="食べたものを入力…"/>
      <button onClick={send} disabled={loading} style={{border:"none",background:C.blue,borderRadius:10,width:46,minWidth:46,display:"grid",placeItems:"center",cursor:"pointer"}}><Icon n="send" c="#fff" s={18}/></button>
    </div>
  </div>;
}

  </div>;
}

/* ログ本文から登録先の日付を推定。見つからなければ null（"1/2量"等は無視） */
function findLogDate(text){
  const lines=(text||"").split(/\r?\n/);
  const Y=new Date().getFullYear();
  const valid=(mo,d)=> mo>=1&&mo<=12&&d>=1&&d<=31;
  const ymd=(mo,d)=> `${Y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const counter="量倍割個人本枚杯皿口分袋切玉合勺人前";
  // 1) M月D日（最も確実）
  for(const l of lines){ const m=l.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日/); if(m&&valid(+m[1],+m[2])) return ymd(+m[1],+m[2]); }
  // 2) YYYY/M/D（年つき）
  for(const l of lines){ const m=l.match(/\d{4}\s*[\/.\-]\s*(\d{1,2})\s*[\/.\-]\s*(\d{1,2})/); if(m&&valid(+m[1],+m[2])) return ymd(+m[1],+m[2]); }
  // 3) M/D。まず「摂取量/本日/合計…」を含む行、無ければ ※以外の行。助数詞が続く分数は除外
  const scan=(filter)=>{
    for(const l of lines){
      if(!filter(l)) continue;
      const re=/(\d{1,2})\s*\/\s*(\d{1,2})/g; let m;
      while((m=re.exec(l))){
        if(counter.includes(l.charAt(m.index+m[0].length))) continue;
        if(valid(+m[1],+m[2])) return ymd(+m[1],+m[2]);
      }
    }
    return null;
  };
  return scan(l=>/(摂取量|本日|合計|今日|日付|記録)/.test(l)) || scan(l=>!/^\s*[※*]/.test(l)) || null;
}

/* 1日分のログを貼り付け → 食事として分類 */
function parseDayLog(text){
  const emoji=/^[\u2600-\u27BF\u2B00-\u2BFF\u{1F000}-\u{1FAFF}\uFE0F]/u;
  const lines=(text||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  let timing="昼食", names=[], intotal=false; const meals=[];
  let date=findLogDate(text);
  const isTotal=l=>/合計|摂取量|総カロリー|total/i.test(l);
  const timingOf=l=>{ if(/朝/.test(l))return "朝食"; if(/昼/.test(l))return "昼食"; if(/夜|夕|晩/.test(l))return "夕食"; if(/酒|間食|おやつ|夜食|デザート|おつまみ/.test(l))return "間食"; return null; };
  for(const l of lines){
    if(emoji.test(l)){
      if(isTotal(l)){ names=[]; intotal=true; continue; }
      const t=timingOf(l); if(t) timing=t; names=[]; intotal=false; continue;
    }
    if(isTotal(l)) continue;
    if(intotal) continue;
    if(/^[※*]/.test(l)) continue;
    const kcalM=l.match(/(\d+(?:\.\d+)?)\s*kcal/i);
    if(kcalM){
      const num=re=>{const m=l.match(re);return m?parseFloat(m[1]):0;};
      meals.push({ timing, name:names.join("、")||"食事", kcal:Math.round(parseFloat(kcalM[1])), p:Math.round(num(/P\s*(\d+(?:\.\d+)?)/i)), f:Math.round(num(/F\s*(\d+(?:\.\d+)?)/i)), c:Math.round(num(/C\s*(\d+(?:\.\d+)?)/i)) });
      names=[];
    } else names.push(l);
  }
  return {date, meals};
}

/* コピペ1行を {name,kcal,p,f,c} に分類 */
function parseFavLine(line){
  const t=(line||"").trim();
  if(!t) return null;
  const num=re=>{const m=t.match(re);return m?parseFloat(m[1]):0;};
  const kcalM=t.match(/(\d+(?:\.\d+)?)\s*kcal/i);
  const kcal=kcalM?parseFloat(kcalM[1]):0;
  const p=num(/P\s*(\d+(?:\.\d+)?)/i), f=num(/F\s*(\d+(?:\.\d+)?)/i), c=num(/C\s*(\d+(?:\.\d+)?)/i);
  let name;
  if(kcalM) name=t.slice(0,kcalM.index);
  else { const pm=t.match(/P\s*\d/i); name=pm?t.slice(0,pm.index):t; }
  name=name.replace(/[\/\-・\s]+$/,"").trim()||"名称未設定";
  return {name,kcal:Math.round(kcal),p:Math.round(p),f:Math.round(f),c:Math.round(c)};
}

function exportData(){

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=`pfclog-backup-${todayKey()}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importData(file,onDone){
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(d.allMeals) LS.set("allMeals",d.allMeals);
    if(d.favorites) LS.set("favorites",d.favorites);
    if(d.goals) LS.set("goals",d.goals);
    if(d.weights) LS.set("weights",d.weights);
    if(d.model) LS.set("model",d.model);
    onDone(true);
  }catch{ onDone(false); } };
  r.readAsText(file);
}

  if(!keys.length) return <div className="card" style={{textAlign:"center",color:C.sub,fontSize:14}}>記録の履歴がありません。</div>;
  return <>
    <div style={{fontSize:12,color:C.sub,marginBottom:10}}>各項目の ✏️ で修正、🗑 で削除（確認あり）。右上「この日を削除」で1日分まとめて削除できます。</div>
    {keys.map(k=>{const ms=allMeals[k];const kcal=ms.reduce((a,m)=>a+m.kcal,0);
      return <div key={k} className="card" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontWeight:700,color:C.ink}}>{fmtDateW(k)}</span>
          <span style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:700,color:C.kcal}}>{kcal} kcal</span>
            {confirmKey===k
              ? <span style={{display:"flex",gap:6,alignItems:"center"}}>
                  <button onClick={()=>{ onDelDay(k); setConfirmKey(null); }} style={{border:"none",background:C.fat,color:"#fff",borderRadius:8,padding:"6px 10px",fontWeight:700,cursor:"pointer",fontSize:11}}>削除する</button>
                  <button onClick={()=>setConfirmKey(null)} style={{border:`1px solid ${C.line}`,background:"#fff",color:C.sub,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11}}>やめる</button>
                </span>
              : <button onClick={()=>setConfirmKey(k)} style={{border:"none",background:"transparent",color:C.fat,fontSize:11,cursor:"pointer",fontWeight:600,padding:"4px 2px"}}>この日を削除</button>}
          </span>
        </div>
        {ms.map(m=><HistMeal key={m.id} dk={k} m={m} onEdit={onEdit} onDelete={onDelete}/>)}
      </div>;
    })}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
